<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photos Express - Hospedagem Rápida</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .shutter { transition: transform 0.5s ease; }
        .logo-container:hover .shutter { transform: rotate(90deg); }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen flex flex-col">

    <nav class="bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center logo-container cursor-pointer">
                    <svg class="h-9 w-9 mr-2 shutter" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect width="48" height="48" rx="12" fill="#4F46E5"/>
                        <path d="M14 18a3 3 0 013-3h1.5l1.5-2h8l1.5 2H31a3 3 0 013 3v13a3 3 0 01-3 3H17a3 3 0 01-3-3V18z" fill="white"/>
                        <circle cx="24" cy="24" r="4.5" fill="#4F46E5"/>
                        <circle cx="24" cy="24" r="2.5" fill="white"/>
                    </svg>
                    <span class="font-bold text-xl tracking-tight text-gray-900">Photos<span class="text-indigo-600">Express</span></span>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center p-6">
        <div class="max-w-md w-full bg-white rounded-xl shadow-lg p-8 space-y-6">
            <div class="text-center">
                <h2 class="text-2xl font-bold text-gray-900">Upload de Imagem</h2>
                <p class="text-gray-500 text-sm mt-1">Hospede e compartilhe em segundos.</p>
            </div>

            <!-- Input fora do fluxo visual, disparado via JS -->
            <input type="file" id="fileInput" class="hidden" accept="image/jpeg,image/png,image/gif,image/webp,image/bmp" multiple>

            <div id="drop-zone" onclick="document.getElementById('fileInput').click()" class="border-2 border-dashed border-gray-300 rounded-lg p-8 text-center hover:bg-gray-50 transition cursor-pointer">
                <div class="space-y-2">
                    <svg class="mx-auto h-12 w-12 text-gray-400" stroke="currentColor" fill="none" viewBox="0 0 48 48">
                        <path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                    <p class="text-sm text-gray-600">Toque para selecionar imagens</p>
                </div>
            </div>

            <div class="flex items-center justify-between">
                <label class="flex items-center space-x-2 cursor-pointer">
                    <input type="checkbox" id="privateCheck" class="form-checkbox h-4 w-4 text-indigo-600 rounded">
                    <span class="text-sm text-gray-700">Link Privado (Não listado)</span>
                </label>
                <button id="uploadBtn" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-indigo-700 transition shadow-md disabled:opacity-50">
                    Gerar Link
                </button>
            </div>

            <div id="resultArea" class="hidden mt-6 space-y-3 bg-gray-50 p-4 rounded-lg border border-gray-200">
                <p class="text-xs font-semibold text-gray-500 uppercase">Links Gerados</p>
                <div id="resultList" class="space-y-3"></div>
            </div>
        </div>
    </main>

    <script>
        const fileInput = document.getElementById('fileInput');
        const uploadBtn = document.getElementById('uploadBtn');

        fileInput.addEventListener('change', () => {
            const count = fileInput.files.length;
            if (count === 1) {
                uploadBtn.innerText = `Enviar: ${fileInput.files[0].name}`;
            } else if (count > 1) {
                uploadBtn.innerText = `Enviar ${count} imagens`;
            }
        });

        uploadBtn.addEventListener('click', async () => {
            const files = fileInput.files;
            if (!files.length) return alert('Selecione uma ou mais imagens primeiro.');

            const isPrivate = document.getElementById('privateCheck').checked;
            uploadBtn.disabled = true;
            document.getElementById('resultArea').classList.add('hidden');
            document.getElementById('resultList').innerHTML = '';

            const toBase64 = file => new Promise((resolve, reject) => {
                const r = new FileReader();
                r.onload = () => resolve(r.result);
                r.onerror = reject;
                r.readAsDataURL(file);
            });

            let successCount = 0;
            for (let i = 0; i < files.length; i++) {
                uploadBtn.innerText = `Enviando ${i + 1}/${files.length}...`;
                try {
                    const base64Data = await toBase64(files[i]);
                    const response = await fetch('/upload', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ image: base64Data, isPrivate })
                    });
                    const data = await response.json();
                    if (data.url) {
                        successCount++;
                        const fullUrl = window.location.origin + data.url;
                        const item = document.createElement('div');
                        item.className = 'space-y-1';
                        item.innerHTML = `
                            <p class="text-xs font-semibold text-gray-500 uppercase truncate">${files[i].name}</p>
                            <div class="flex">
                                <input type="text" readonly value="${fullUrl}" class="flex-1 text-sm p-2 border border-gray-300 rounded-l focus:outline-none bg-white">
                                <button onclick="copyText(this)" data-url="${fullUrl}" class="bg-gray-200 px-3 py-2 rounded-r hover:bg-gray-300 text-xs font-bold text-gray-600">COPIAR</button>
                            </div>`;
                        document.getElementById('resultList').appendChild(item);
                    }
                } catch (e) {
                    console.error(`Erro ao enviar ${files[i].name}:`, e);
                }
            }

            if (successCount > 0) {
                document.getElementById('resultArea').classList.remove('hidden');
                uploadBtn.innerText = successCount === files.length ? 'Sucesso!' : `${successCount}/${files.length} enviadas`;
            } else {
                alert('Erro ao enviar as imagens.');
                uploadBtn.innerText = 'Gerar Link';
            }
            uploadBtn.disabled = false;
        });

        function copyText(btn) {
            navigator.clipboard.writeText(btn.dataset.url).then(() => {
                const original = btn.innerText;
                btn.innerText = '✓';
                setTimeout(() => btn.innerText = original, 1500);
            });
        }
    </script>
</body>
</html>
