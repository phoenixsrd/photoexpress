<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Express - Hospedagem Rápida</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Animação simples para o logo */
        .shutter { transition: transform 0.5s ease; }
        .logo-container:hover .shutter { transform: rotate(90deg); }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen flex flex-col">

    <nav class="bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center logo-container cursor-pointer">
                    <svg class="h-8 w-8 text-indigo-600 mr-2 shutter" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                    <span class="font-bold text-xl tracking-tight text-gray-900">Photo<span class="text-indigo-600">Express</span></span>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center p-6">
        <div class="max-w-md w-full bg-white rounded-xl shadow-lg p-8 space-y-6">
            <div class="text-center">
                <h2 class="text-2xl font-bold text-gray-900">Upload de Imagem</h2>
                <p class="text-gray-500 text-sm mt-1">Hospede e compartilhe em segundos.</p>
            </div>

            <div id="drop-zone" class="border-2 border-dashed border-gray-300 rounded-lg p-8 text-center hover:bg-gray-50 transition cursor-pointer relative">
                <input type="file" id="fileInput" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" accept="image/*">
                <div class="space-y-2">
                    <svg class="mx-auto h-12 w-12 text-gray-400" stroke="currentColor" fill="none" viewBox="0 0 48 48">
                        <path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                    <p class="text-sm text-gray-600">Clique ou arraste uma imagem aqui</p>
                </div>
            </div>

            <div class="flex items-center justify-between">
                <label class="flex items-center space-x-2 cursor-pointer">
                    <input type="checkbox" id="privateCheck" class="form-checkbox h-4 w-4 text-indigo-600 rounded">
                    <span class="text-sm text-gray-700">Link Privado (Não listado)</span>
                </label>
                <button id="uploadBtn" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-indigo-700 transition shadow-md disabled:opacity-50">
                    Gerar Link
                </button>
            </div>

            <div id="resultArea" class="hidden mt-6 space-y-4 bg-gray-50 p-4 rounded-lg border border-gray-200">
                <div>
                    <label class="block text-xs font-semibold text-gray-500 uppercase">Link Direto</label>
                    <div class="flex mt-1">
                        <input type="text" id="shareUrl" readonly class="flex-1 text-sm p-2 border border-gray-300 rounded-l focus:outline-none bg-white">
                        <button onclick="copyToClipboard('shareUrl')" class="bg-gray-200 px-3 py-2 rounded-r hover:bg-gray-300 text-xs font-bold text-gray-600">COPIAR</button>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 uppercase">Código para Incorporar (HTML)</label>
                    <div class="flex mt-1">
                        <input type="text" id="embedCode" readonly class="flex-1 text-sm p-2 border border-gray-300 rounded-l focus:outline-none bg-white font-mono text-xs">
                        <button onclick="copyToClipboard('embedCode')" class="bg-gray-200 px-3 py-2 rounded-r hover:bg-gray-300 text-xs font-bold text-gray-600">COPIAR</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const fileInput = document.getElementById('fileInput');
        const uploadBtn = document.getElementById('uploadBtn');
        
        fileInput.addEventListener('change', () => {
            if(fileInput.files.length > 0) {
                uploadBtn.innerText = `Enviar: ${fileInput.files[0].name}`;
            }
        });

        uploadBtn.addEventListener('click', async () => {
            const file = fileInput.files[0];
            if (!file) return alert('Selecione uma imagem primeiro.');
            
            // Converter para Base64
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async () => {
                const base64Data = reader.result; // Inclui metadados "data:image/png;base64,..."
                const isPrivate = document.getElementById('privateCheck').checked;

                uploadBtn.disabled = true;
                uploadBtn.innerText = "Processando...";

                try {
                    const response = await fetch('/.netlify/functions/upload', {
                        method: 'POST',
                        body: JSON.stringify({ image: base64Data, isPrivate })
                    });
                    const data = await response.json();

                    if(data.url) {
                        document.getElementById('resultArea').classList.remove('hidden');
                        const fullUrl = window.location.origin + data.url;
                        document.getElementById('shareUrl').value = fullUrl;
                        document.getElementById('embedCode').value = `<img src="${fullUrl}" alt="Photo Express Image" />`;
                        uploadBtn.innerText = "Sucesso!";
                    } else {
                        alert('Erro ao enviar.');
                    }
                } catch (e) {
                    console.error(e);
                    alert('Erro no servidor.');
                } finally {
                    uploadBtn.disabled = false;
                }
            };
        });

        function copyToClipboard(id) {
            const copyText = document.getElementById(id);
            copyText.select();
            document.execCommand("copy");
            alert("Copiado!");
        }
    </script>
</body>
</html>
